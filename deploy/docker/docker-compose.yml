# Atlas + PostgreSQL (pgvector) for a portable, reproducible deployment (ADR-0053).
# Ollama is expected on the host; the app reaches it via host.docker.internal.
#
#   docker compose -f deploy/docker/docker-compose.yml up --build
#
# Set secrets in a .env file next to this compose file (ATLAS_DB_PASSWORD, ATLAS_API_KEYS).

services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: atlas
      POSTGRES_USER: atlas
      POSTGRES_PASSWORD: ${ATLAS_DB_PASSWORD:-atlas}
    volumes:
      - atlas_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U atlas -d atlas"]
      interval: 5s
      timeout: 5s
      retries: 10

  atlas:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
    depends_on:
      db:
        condition: service_healthy
    environment:
      ATLAS_API_HOST: 0.0.0.0
      ATLAS_DATABASE_HOST: db
      ATLAS_DB_PASSWORD: ${ATLAS_DB_PASSWORD:-atlas}
      ATLAS_API_KEYS: ${ATLAS_API_KEYS:-}
      # Reach the host's Ollama from inside the container.
      ATLAS_LLM_HOST: http://host.docker.internal:11434
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8000:8000"
    volumes:
      - atlas_data:/data/atlas_data

volumes:
  atlas_pgdata:
  atlas_data:
