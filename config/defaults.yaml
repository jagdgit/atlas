system:
  name: Atlas
  version: 0.1.0
  timezone: UTC

paths:
  data: /data/atlas_data
  documents: /data/atlas_data/documents
  knowledge: /data/atlas_data/knowledge
  embeddings: /data/atlas_data/embeddings
  models: /data/atlas_data/models
  logs: /data/atlas_data/logs
  checkpoints: /data/atlas_data/checkpoints
  state: /data/atlas_data/state
  cache: /data/atlas_data/cache
  backups: /data/atlas_data/backups

database:
  host: localhost
  port: 5432
  database: atlas
  user: atlas
  # password: set via ATLAS_DB_PASSWORD env var or .env file (never commit secrets)
  pool_size: 5

llm:
  provider: ollama
  host: http://localhost:11434
  model: qwen3:4b                 # back-compat scalar; seeds the `chat` role below
  embedding_model: nomic-embed-text   # back-compat scalar; seeds the `embed` role
  temperature: 0
  timeout: 300                    # CPU inference under memory pressure can exceed 120s
  interactive_timeout: 60         # RC/D3.12c: shorter wall-clock for /api/chat answers
  keep_alive: 5m
  think: false                   # qwen3 chain-of-thought is very slow on CPU; keep answers direct
  max_concurrency: 1              # R4: single LLM lane on CPU (never two models at once)
  # Role → model registry (D7). Callers ask LLMService for a *role*, never a model.
  # 16 GB now: chat=4b, heavier roles=8b. At 64 GB, bump researcher to a 14b model
  # here (config-only) — no code changes. Pull a model before the sprint that uses it.
  # NOTE: on this 16 GB box only qwen3:4b, llama3, nomic-embed-text are pulled, so every
  # role maps to a pulled model (one small resident model at a time). Bump these back to
  # 8b/14b once you `ollama pull` them and have the RAM (config-only, no code change).
  roles:
    chat:       { provider: ollama, model: qwen3:4b }
    planner:    { provider: ollama, model: qwen3:4b }
    researcher: { provider: ollama, model: qwen3:4b }
    summarizer: { provider: ollama, model: qwen3:4b }
    code:       { provider: ollama, model: llama3 }
    vision:     { provider: ollama, model: gemma3 }   # not pulled; vision paths degrade until `ollama pull gemma3`
    embed:      { provider: ollama, model: nomic-embed-text }

knowledge:
  chunk_max_words: 200
  chunk_overlap: 40
  embed_batch: 32

react:
  max_iterations: 3         # cap on reason->act->observe cycles per run (fewer LLM calls on CPU)
  reflection: false         # self-review pass adds a whole extra LLM call; too slow on CPU
  max_observation_chars: 2000
  temperature: 0
  think: false              # JSON "thought" field replaces Ollama chain-of-thought (faster)

scheduler:
  workers: 3                # ≥ jobs.max_concurrent so 3 jobs can advance at once (R1)
  checkpoint_interval: 60
  max_retries: 3
  drain_timeout: 30.0       # graceful shutdown: seconds to finish in-flight work (S22)

logging:
  level: INFO
  max_bytes: 10485760   # 10MB
  backup_count: 5

audit:
  retention_days: 90

backup:
  enabled: true
  interval_seconds: 86400   # daily pg_dump; 0 = manual only
  retention: 7              # keep the 7 most-recent dumps (0 = keep all)
  pg_dump_path: pg_dump
  pg_restore_path: pg_restore

memory:
  recall_k: 5
  similarity_floor: 0.0
  working_ttl_seconds: 3600   # working memory expires after 1h by default (0 = never)
  embed_working: false        # embed working memory for recall (usually off)
  prune_interval: 3600        # seconds between expired-memory prunes (0 = manual)

conversation:
  max_context_turns: 10       # recent messages assembled into prompt context per turn
  working_memory_k: 5         # relevant working memories recalled per turn
  session_ttl_seconds: 0      # 0 = sessions persist indefinitely

jobs:
  max_concurrent: 3           # R1: concurrent jobs (bounded by scheduler.workers)
  step_max_retries: 2         # per-step transient-error retries before `failed`
  retry_delay: 2.0            # seconds before a retried step re-runs
  llm_decompose: true         # D2c: planner-role LLM decomposition into multiple steps
  max_steps: 6                # cap on decomposed steps per job
  research_first: true        # lone open-ended objective => research loop (sources), not a bare react answer
  planner_timeout: 60.0       # 3.2e: planner-role wall-clock; then deterministic fallback
  planner_num_predict: 512    # keep decompose responses short (JSON steps only)

net:
  # Resilient/polite HTTP layer (D10 / §5c) shared by every web-facing plugin.
  user_agent: "Atlas/0.1 (+https://localhost)"
  timeout: 15
  max_bytes: 2097152        # 2 MiB fetched-body cap
  per_domain_delay: 1.0     # min seconds between requests to the same domain
  max_retries: 3            # bounded retries on 429/503/5xx/timeout (with backoff)
  backoff_base: 1.0         # delay = backoff_base * 2**attempt (+ jitter), capped
  backoff_cap: 30.0
  jitter: 0.25              # random 0..jitter seconds added per backoff
  respect_robots: true      # honour robots.txt allow/deny + crawl-delay
  cache_ttl: 300.0          # response cache TTL seconds (0 = disable)

code:
  # Code understanding (S14, D9/§5b): pure-CPU structural parse (Python=ast,
  # others=tree-sitter). Caps keep repo scans bounded on the R4 hardware.
  max_file_bytes: 1048576   # 1 MiB per-file parse cap
  max_files: 5000           # cap on files scanned per repo
  ingest_on_index: false    # index() pushes code-aware chunks into the knowledge base

sandbox:
  # Python execution sandbox (S16, D6): hybrid — subprocess (default) runs code in a
  # child interpreter with rlimit CPU/memory/file caps + a hard timeout + stripped env
  # + network disabled; a docker backend can be swapped in later via `backend: docker`.
  backend: subprocess
  timeout: 30.0            # wall-clock seconds before a run is killed
  cpu_seconds: 30          # RLIMIT_CPU cap
  memory_mb: 1024          # RLIMIT_AS (address-space) cap, MiB
  max_output_bytes: 262144 # truncate stdout/stderr beyond this
  max_code_bytes: 262144   # refuse code larger than this
  network: false           # no network by default (opt-in per run)
  # dir: /data/atlas_data/sandbox   # workdir root (default: paths.data/sandbox)

research:
  # Evidence Budget (S15, D8/§5a): the Verification Engine stops on *convergence*,
  # not a fixed paper count. Per-job overridable by the planner.
  min_sources: 5
  min_peer_reviewed: 3      # L4+ peer-reviewed papers
  min_government: 1         # L3 government / national-lab reports
  convergence: 0.90         # numeric agreement threshold to stop
  max_search_iterations: 20
  numeric_tolerance: 0.15   # relative window within which values "agree"
  per_query: 5              # sources gathered per search in the research loop (S21)
  max_documents: 12         # Stage 3 (D3.2): cap on documents acquired + read per job

resources:
  # Stage 3.2 — operator-owned caps + OCR safety bounds (D32.3 / Q8).
  # Profiles deepen with the Resource Manager in 3.2c; env overrides:
  # ATLAS_RESOURCES_MAX_WORKER_THREADS, ATLAS_RESOURCES_OCR_MAX_PAGES, …
  profile: balanced
  max_worker_threads: 4
  max_download_workers: 4
  max_reader_workers: 4
  max_ocr_workers: 2
  max_extract_workers: 2
  ocr_max_pages: 50
  ocr_max_minutes: 15
  ocr_dpi: 300
  # Stage 3.2d static-first task cost model. These are permanent,
  # operator-tunable estimates; Stage 4 learns machine-specific values.
  costs:
    download:      { units: 1,  ram_mb: 64,   llm_slots: 0 }
    read_html:     { units: 2,  ram_mb: 128,  llm_slots: 0 }
    read_pdf:      { units: 3,  ram_mb: 256,  llm_slots: 0 }
    embedding:     { units: 6,  ram_mb: 700,  llm_slots: 1 }
    ocr_pdf:       { units: 8,  ram_mb: 900,  llm_slots: 0 }
    llm_extract:   { units: 15, ram_mb: 2100, llm_slots: 1 }
    llm_plan:      { units: 12, ram_mb: 2100, llm_slots: 1 }
    llm_summarize: { units: 12, ram_mb: 2100, llm_slots: 1 }
    verify:        { units: 2,  ram_mb: 128,  llm_slots: 0 }
    report:        { units: 3,  ram_mb: 256,  llm_slots: 0 }
  budgets:
    conservative: 12
    balanced: 20
    maximum: 32
    overnight: 32

learning:
  # Continuous Learning (S18b, D11/§5d). Atlas never silently learns: completed
  # activities are *proposed*; applying them into a store is explicit & reversible.
  enabled: true
  observe_jobs: true       # propose an Experience from each completed job
  auto_apply: false        # if true, apply proposals immediately (still governed)
  default_policy: temporary  # temporary | project | personal | verified
  default_level: 1         # Learning Level L1 (Store)
  recall_k: 5

intelligence:
  # Engineering Intelligence (S19, D11/§5d): higher-order learners over the Code
  # store — learn repos (L2), connect/search (L3), generalize patterns (L4),
  # recommend (L5). Repository learning is governed through the S18b ledger.
  enabled: true
  default_policy: project
  generalize_min_repos: 2
  generalize_min_prevalence: 0.6
  recommend_top_k: 5

plugins:
  # Dotted module paths; each exposes build(config) -> Plugin. Only listed
  # plugins load (fail-closed). Add github/database/email modules here later.
  enabled:
    - atlas.plugins.filesystem_plugin
    - atlas.plugins.web_plugin
    - atlas.plugins.search_plugin
    - atlas.plugins.downloader_plugin
    - atlas.plugins.scholar_plugin
    - atlas.plugins.youtube_plugin
    - atlas.plugins.git_plugin
    - atlas.plugins.sql_plugin
    - atlas.plugins.ocr_plugin
    - atlas.plugins.mail_plugin
    - atlas.plugins.browser_plugin
  filesystem:
    root: null              # sandbox root for reads/lists; null => paths.documents
    max_bytes: 1048576      # 1 MiB per-file read cap
  web:
    timeout: 15
    max_bytes: 2097152      # 2 MiB fetched-body cap
    user_agent: "Atlas/0.1 (+https://localhost)"
  search:
    providers: [duckduckgo] # D5: ordered; first with results wins (fallback)
    max_results: 5
    endpoint: "https://html.duckduckgo.com/html/"
  downloader:
    dir: null               # downloads dir; null => paths.data/downloads
  scholar:                  # S18a: academic search → graded evidence (§5a)
    providers: [semantic_scholar, arxiv]  # ordered; first with papers wins
    max_results: 5
    arxiv_level: 3          # arXiv preprints ⇒ L3 (not peer-reviewed)
    semantic_scholar_level: 4  # published venues ⇒ L4 peer-reviewed
    semantic_scholar_api_key: ""  # optional; keyless works but is rate-limited
  youtube:                  # S18a: video transcripts (L1 evidence)
    languages: [en]
  git:                      # S20a: read-only local VCS inspection (network-free)
    git_binary: git
    timeout: 15             # hard wall-clock per git invocation
    max_log: 50             # default commits returned by log/file_history
  sql:                      # S20b: read-only SQL over local databases (SQLite default)
    root: null              # sandbox root for db files; null => paths.data
    default_source: null    # default db file when a call omits `source`
    max_rows: 1000          # cap rows returned by a query
    timeout: 15             # soft per-query wall-clock
  ocr:                      # S20c: image → text (Tesseract; degrades if not installed)
    root: null              # sandbox root for images; null => paths.documents
    lang: eng               # default tesseract language code
    max_bytes: 10485760     # 10 MiB per-image cap
  mail:                     # S20d: read-only IMAP mailbox (degrades if unconfigured)
    host: ""                # IMAP host; empty => capability reports "unavailable"
    port: 993
    username: ""
    password_env: ATLAS_MAIL_PASSWORD  # env var holding the password (secret; not YAML)
    use_ssl: true
    default_folder: INBOX
    max_results: 25         # cap messages returned by a search
    timeout: 20             # socket timeout per IMAP connection
  browser:                  # S20e: headless browser (degrades if Playwright not installed)
    browser: chromium       # chromium | firefox | webkit
    headless: true
    timeout: 30             # per-navigation wall-clock (seconds)
    wait_until: load        # load | domcontentloaded | networkidle
    max_text_chars: 20000   # cap rendered text returned
    max_links: 100          # cap links returned
    respect_robots: true    # honour robots.txt via the shared net policy
    screenshot_root: null    # sandbox for screenshots; null => paths.data/screenshots

api:
  host: 127.0.0.1        # bind localhost; set 0.0.0.0 to expose on the network
  port: 8000
  docs_enabled: true     # Swagger UI at /docs, OpenAPI at /openapi.json
  cors_origins: []       # e.g. ["http://localhost:5173"] for a local web UI
  metrics_enabled: true  # Prometheus /metrics + JSON /v1/metrics
  ui_enabled: true       # bundled web console at /ui (same-origin SPA, S23)
  # keys: set via ATLAS_API_KEYS (comma-separated) in .env — never commit secrets.
  #       Empty => the API fails closed (all protected routes return 401).
